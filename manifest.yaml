apiVersion: v1
kind: ServiceAccount
metadata: { name: sandbox-cni, namespace: kube-system }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: sandbox-cni }
rules:
    - apiGroups: [""]
      resources: ["nodes"]
      verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: sandbox-cni }
roleRef:
    {
        apiGroup: rbac.authorization.k8s.io,
        kind: ClusterRole,
        name: sandbox-cni,
    }
subjects:
    - { kind: ServiceAccount, name: sandbox-cni, namespace: kube-system }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
    name: sandbox-cni
    namespace: kube-system
    labels: { k8s-app: sandbox-cni }
spec:
    selector: { matchLabels: { k8s-app: sandbox-cni } }
    template:
        metadata: { labels: { k8s-app: sandbox-cni } }
        spec:
            hostNetwork: true
            priorityClassName: system-node-critical
            serviceAccountName: sandbox-cni
            tolerations:
                - operator: Exists
            containers:
                - name: install
                  image: ghcr.io/kasumimercury/sandbox-cni:dev
                  env:
                      - name: NODE_NAME
                        valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
                  securityContext: { privileged: true }
                  volumeMounts:
                      - { name: cni-bin, mountPath: /host/opt/cni/bin }
                      - { name: cni-conf, mountPath: /host/etc/cni/net.d }
            volumes:
                - name: cni-bin
                  hostPath: { path: /opt/cni/bin, type: DirectoryOrCreate }
                - name: cni-conf
                  hostPath: { path: /etc/cni/net.d, type: DirectoryOrCreate }

